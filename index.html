<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock papper scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1><I>ROCK PAPPER SCISSORS</I></h1>
    <div class="choices">
        <div class="options" id="rock">
            <img src="/images/rock.png" alt="ROCK">
        </div>
         <div class="options" id="papper">
            <img src="/images/paper.png" alt="PAPPER">
        </div>
         <div class="options" id="scissor">
            <img src="/images/scissors.png" alt="SCISSORS">
        </div>
    </div>
    <div class="score-board">
        <div class="score">
            <p id="user score">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="system-score">0</p>
            <p>system</p>
        </div>
    </div>
    <div class="msg-container">
        <p id="msg"> Play Your Move</p>
    </div>
</body>
</html>
